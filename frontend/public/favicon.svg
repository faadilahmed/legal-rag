<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Rounded square background (matches app's bg-card dark slate) -->
  <rect width="64" height="64" rx="14" fill="#0f172a"/>
  <!-- Subtle inner stroke to lift the icon from dark browser tabs -->
  <rect x="0.5" y="0.5" width="63" height="63" rx="13.5" stroke="#1e293b" stroke-width="1"/>
  <!-- "10K" wordmark, bold, white -->
  <text
    x="32"
    y="43"
    font-family="ui-monospace, 'JetBrains Mono', SFMono-Regular, Menlo, monospace"
    font-size="24"
    font-weight="700"
    fill="#fafafa"
    text-anchor="middle"
    letter-spacing="-0.5"
  >10K</text>
  <!-- Blue accent bar — brand color tie to the primary -->
  <rect x="18" y="50" width="28" height="3" rx="1.5" fill="#3b82f6"/>
</svg>
